  "Global": "#3366cc",

  "Europe": "#3366cc",
  "Asia-Pacific": "#4a90d9",
  "Latam": "#5b8abf",
  "Middle East & Africa": "#2c5aa0",
};

function fmt(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + "B";
  if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
  return n.toString();
}

function pct(n) {
  return (n * 100).toFixed(1) + "%";
}

function getFilteredData(region) {
  if (region === "Global") return DATA;
  return DATA.filter(d => d.region === region);
}

function computeMetrics(items) {
  const totalContacts = items.reduce((s, d) => s + d.total_contacts, 0);
  const totalEnriched = items.reduce((s, d) => s + d.enriched, 0);
  const totalFound = items.reduce((s, d) => s + d.emails_found, 0);
  const projected = items.reduce((s, d) => s + d.projected_emails, 0);
  const rate = totalEnriched > 0 ? totalFound / totalEnriched : 0;
  const processed = items.filter(d => d.processed).length;
  return { totalContacts, totalEnriched, totalFound, projected, rate, processed, total: items.length };
}

}

          </span>
        </div>
      `).join("")}
    </div>
  `;
}

function renderMap(region) {
  const active = getFilteredData(region);
  const activeISOs = new Set(active.map(d => d.iso));

  // Active countries (in selected region)
  const activeData = active.filter(d => d.processed);
  const pendingActive = active.filter(d => !d.processed);

  // All other countries in our dataset but not in region
  const others = region === "Global" ? [] : DATA.filter(d => !activeISOs.has(d.iso));

  const traces = [];

  // Other regions — faded
  if (others.length > 0) {
    traces.push({
      type: "choropleth",
      locations: others.map(d => d.iso),
      z: others.map(() => 0.5),
      text: others.map(d => `<b>${d.country}</b><br>${d.region}`),
      hovertemplate: "%{text}<extra></extra>",
      colorscale: [[0, INACTIVE_COLOR], [1, INACTIVE_COLOR]],
      showscale: false,
      marker: { line: { color: "#fff", width: 0.5 } },
    });
  }

  // Pending in region — lighter blue
  if (pendingActive.length > 0) {
    traces.push({
      type: "choropleth",
      locations: pendingActive.map(d => d.iso),
      z: pendingActive.map(() => 0.5),
      text: pendingActive.map(d =>
        `<b>${d.country}</b> (Tier ${d.tier})<br>` +
        `Contacts: ${fmt(d.total_contacts)}<br>` +
        `<i>Enrichment pending</i>`
      ),
      hovertemplate: "%{text}<extra></extra>",
      colorscale: [[0, "#a8c4e0"], [1, "#a8c4e0"]],
      showscale: false,
      marker: { line: { color: "#fff", width: 0.5 } },
    });
  }

  // Processed in region — full blue gradient
  if (activeData.length > 0) {
    traces.push({
      type: "choropleth",
      locations: activeData.map(d => d.iso),
      z: activeData.map(d => d.projected_emails),
      text: activeData.map(d =>
        `<b>${d.country}</b> (Tier ${d.tier})<br><br>` +
        `Sample: ${d.enriched} enriched<br>` +
        `Emails found: ${d.emails_found}<br>` +
        `<b>Success rate: ${pct(d.success_rate)}</b><br><br>` +
        `Total contacts: ${fmt(d.total_contacts)}<br>` +
        `<b>Projected emails: ${fmt(d.projected_emails)}</b>`
      ),
      hovertemplate: "%{text}<extra></extra>",
      colorscale: [
        [0, "#a8c4e0"],
        [0.3, "#6a9fd8"],
        [0.6, "#3366cc"],
        [1, "#1a3a7a"],
      ],
      showscale: false,
      marker: { line: { color: "#fff", width: 0.5 } },
    });
  }

  const layout = {
    geo: {
      showframe: false,
      showcoastlines: false,
      showland: true,
      landcolor: "#eef1f6",
      showocean: true,
      oceancolor: "#fff",
      showcountries: true,
      countrycolor: "#e0e0e0",
      projection: { type: "natural earth" },
      bgcolor: "#fff",
    },
    paper_bgcolor: "#fff",
    plot_bgcolor: "#fff",
    margin: { l: 0, r: 0, t: 0, b: 0 },
    height: 420,
    dragmode: false,
  };

  Plotly.react("map", traces, layout, { displayModeBar: false, responsive: true });
}

function selectRegion(region) {
  currentRegion = region;
  renderTabs();
  renderMap(region);
  renderMetrics(region);
}

// Init
renderTabs();
renderMap("Global");
renderMetrics("Global");
</script>
